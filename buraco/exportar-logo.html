<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Exportar Logo ATP 2000</title></head>
<body style="background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px;font-family:sans-serif;color:#fff">
  <canvas id="c" style="border:1px solid #333"></canvas>
  <div style="display:flex;gap:12px">
    <button onclick="baixar(500,'jpg')"  style="background:#7b1f35;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:1rem;cursor:pointer">⬇ Baixar JPG 500px</button>
    <button onclick="baixar(1000,'jpg')" style="background:#7b1f35;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:1rem;cursor:pointer">⬇ Baixar JPG 1000px</button>
    <button onclick="baixar(500,'png')"  style="background:#333;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:1rem;cursor:pointer">⬇ Baixar PNG 500px (transparente)</button>
  </div>

<script>
const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 84" width="500" height="420">
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <ellipse cx="50" cy="82" rx="32" ry="4" fill="#00000033"/>
  <path d="M50,3 L94,17 L94,50 Q94,75 50,83 Q6,75 6,50 L6,17 Z" fill="#0a3018"/>
  <path d="M50,3 L94,17 L94,50 Q94,75 50,83 Q6,75 6,50 L6,17 Z" fill="url(#sg)"/>
  <path d="M50,3 L94,17 L94,50 Q94,75 50,83 Q6,75 6,50 L6,17 Z" fill="none" stroke="#d4a017" stroke-width="2.5"/>
  <path d="M50,9 L88,21 L88,50 Q88,71 50,78 Q12,71 12,50 L12,21 Z" fill="none" stroke="#d4a01744" stroke-width="1"/>
  <line x1="16" y1="47" x2="84" y2="47" stroke="#d4a017" stroke-width="0.8" opacity="0.5"/>
  <g transform="translate(50,14)">
    <polygon points="-9,8 -12,0 -6,4 0,-3 6,4 12,0 9,8" fill="#d4a017"/>
    <rect x="-10" y="8" width="20" height="4" rx="1" fill="#d4a017"/>
    <circle cx="-9" cy="0" r="1.8" fill="#f0c040"/>
    <circle cx="0" cy="-3" r="1.8" fill="#f0c040"/>
    <circle cx="9" cy="0" r="1.8" fill="#f0c040"/>
  </g>
  <text x="50" y="42" text-anchor="middle" font-size="17" fill="#f0c040" font-weight="900" font-family="Georgia,serif" letter-spacing="4">ATP</text>
  <text x="50" y="55" text-anchor="middle" font-size="9.5" fill="#d4a017" font-weight="700" font-family="Georgia,serif" letter-spacing="3">2000</text>
  <text x="23" y="70" text-anchor="middle" font-size="10" fill="#d4a017" font-family="Arial">♠</text>
  <text x="36" y="70" text-anchor="middle" font-size="10" fill="#c0392b" font-family="Arial">♥</text>
  <text x="64" y="70" text-anchor="middle" font-size="10" fill="#c0392b" font-family="Arial">♦</text>
  <text x="77" y="70" text-anchor="middle" font-size="10" fill="#d4a017" font-family="Arial">♣</text>
</svg>`;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const SIZE = 500;
const RATIO = 84/100; // viewBox aspect ratio

canvas.width  = SIZE;
canvas.height = Math.round(SIZE * RATIO);

const img = new Image();
const blob = new Blob([svgStr], {type:'image/svg+xml'});
img.src = URL.createObjectURL(blob);
img.onload = () => {
  ctx.fillStyle = '#120a0e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
};

function baixar(px, fmt) {
  const c2 = document.createElement('canvas');
  c2.width  = px;
  c2.height = Math.round(px * RATIO);
  const x = c2.getContext('2d');

  if (fmt === 'jpg') {
    x.fillStyle = '#120a0e';
    x.fillRect(0, 0, c2.width, c2.height);
  }

  const img2 = new Image();
  img2.src = URL.createObjectURL(new Blob([svgStr.replace('width="500" height="420"', `width="${px}" height="${c2.height}"`)], {type:'image/svg+xml'}));
  img2.onload = () => {
    x.drawImage(img2, 0, 0, c2.width, c2.height);
    const mime = fmt === 'png' ? 'image/png' : 'image/jpeg';
    const a = document.createElement('a');
    a.href = c2.toDataURL(mime, 0.95);
    a.download = `atp2000-logo-${px}.${fmt}`;
    a.click();
  };
}
</script>
</body>
</html>
